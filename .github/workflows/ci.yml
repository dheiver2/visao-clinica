name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - name: Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Self-test (núcleo determinístico)
        run: "$(swift build -c release --show-bin-path)/VisaoClinica --selftest"
